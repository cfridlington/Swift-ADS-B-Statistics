name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        run: |
          curl -O "https://download.swift.org/swiftly/linux/swiftly-1.1.1-$(uname -m).tar.gz"
          tar -zxf swiftly-1.1.1-$(uname -m).tar.gz
          ./swiftly init
          echo "$HOME/.local/share/swiftly/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libsqlite3-dev zlib1g-dev

      - name: Build release binary
        run: swift build -c release -Xswiftc -static-stdlib

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:developer-ci-pipeline
          ping: ${{ secrets.MURDOCK_HOST }}
          
      - name: Add Pi to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.MURDOCK_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Pi
        run: |
          scp \
            .build/release/Swift-ADS-B-Statistics \
            cfridlington@${{ secrets.MURDOCK_HOST }}:/home/cfridlington/Swift-ADS-B-Statistics/.build/release/Swift-ADS-B-Statistics.tmp
          ssh cfridlington@${{ secrets.MURDOCK_HOST }} \
            "mv /home/cfridlington/Swift-ADS-B-Statistics/.build/release/Swift-ADS-B-Statistics.tmp \
                /home/cfridlington/Swift-ADS-B-Statistics/.build/release/Swift-ADS-B-Statistics && \
             chmod +x /home/cfridlington/Swift-ADS-B-Statistics/.build/release/Swift-ADS-B-Statistics"
