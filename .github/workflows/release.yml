name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        run: |
          curl -O https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz
          tar -xzf swiftly-$(uname -m).tar.gz
          ./swiftly init --quiet --assume-yes
          source ~/.local/share/swiftly/env.sh
          swiftly install latest --assume-yes
          echo "$HOME/.local/share/swiftly/bin" >> $GITHUB_PATH

      - name: Build release binary
        run: swift build -c release --triple aarch64-unknown-linux-gnu

      - name: Add Pi to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.MURDOCK_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Pi
        env:
          PI_SSH_KEY: ${{ secrets.MURDOCK_SSH_KEY }}
        run: |
          echo "$PI_SSH_KEY" > key && chmod 600 key
          scp -i key \
            .build/aarch64-unknown-linux-gnu/release/Swift-ADS-B-Statistics \
            cfridlington@${{ secrets.MURDOCK_HOST }}:/home/cfridlington/Swift-ADS-B-Statistics/.build/release/Swift-ADS-B-Statistics.tmp
          ssh -i key cfridlington@${{ secrets.MURDOCK_HOST }} \
            "mv /home/cfridlington/Swift-ADS-B-Statistics/.build/release/Swift-ADS-B-Statistics.tmp \
                /home/cfridlington/Swift-ADS-B-Statistics/.build/release/Swift-ADS-B-Statistics"
