name: Release Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3.2"

      - name: Build release binary
        run: swift build -c release --triple aarch64-unknown-linux-gnu

      - name: Deploy to Murdock
        env:
          PI_SSH_KEY: ${{ secrets.PI_SSH_KEY }}
        run: |
          echo "$PI_SSH_KEY" > key && chmod 600 key
          scp -i key -o StrictHostKeyChecking=no \
            .build/aarch64-unknown-linux-gnu/release/Swift-ADS-B-Statistics \
            cfridlington@192.168.1.185 100.84.141.27:/home/cfridlington/Swift-ADS-B-Statistics/.build/release/Swift-ADS-B-Statistics
